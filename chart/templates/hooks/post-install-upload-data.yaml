{{- if and .Values.minio.enabled .Values.dataUpload.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-upload-taxi-data
  labels:
    {{- include "ai-taxi-anomaly-detector.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
spec:
  template:
    metadata:
      labels:
        {{- include "ai-taxi-anomaly-detector.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: minio
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Values.minio.serviceAccount.name | default "default" }}
      initContainers:
        - name: wait-for-minio
          image: curlimages/curl:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
          args:
            - -c
            - |-
              echo "Waiting for MinIO to be ready..."
              until curl -sf http://{{ include "minio.fullname" . }}:{{ .Values.minio.service.apiPort }}/minio/health/live; do
                echo -n "."
                sleep 5
              done
              echo "MinIO is ready!"
              sleep 10
      containers:
        - name: upload-taxi-data
          image: python:3.11-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
          args:
            - -ec
            - |-
              pip install --user --no-cache-dir -q boto3 pandas numpy
              python3 << 'EOF'
              import os
              import sys
              import tempfile

              import boto3
              import numpy as np
              import pandas as pd

              endpoint = "http://{{ include "minio.fullname" . }}:{{ .Values.minio.service.apiPort }}"
              access_key = os.environ["MINIO_USER"]
              secret_key = os.environ["MINIO_PASSWORD"]
              object_key = os.environ["OBJECT_KEY"]
              buckets = os.environ["BUCKETS"].split(",")

              rng = np.random.default_rng(42)
              rows = 500
              df = pd.DataFrame({
                  "trip_id": np.arange(1, rows + 1),
                  "vendor_id": rng.integers(1, 3, size=rows),
                  "pickup_datetime": pd.date_range("2024-01-01", periods=rows, freq="15min"),
                  "passenger_count": rng.integers(1, 5, size=rows),
                  "trip_distance": rng.uniform(0.5, 20.0, size=rows).round(2),
                  "fare_amount": rng.uniform(5.0, 80.0, size=rows).round(2),
                  "tip_amount": rng.uniform(0.0, 15.0, size=rows).round(2),
              })

              # Inject a few obvious anomalies for demo purposes
              anomaly_idx = rng.choice(rows, size=10, replace=False)
              df.loc[anomaly_idx, "trip_distance"] = rng.uniform(50, 100, size=10).round(2)
              df.loc[anomaly_idx, "fare_amount"] = rng.uniform(200, 500, size=10).round(2)

              s3 = boto3.client(
                  "s3",
                  endpoint_url=endpoint,
                  aws_access_key_id=access_key,
                  aws_secret_access_key=secret_key,
              )

              with tempfile.NamedTemporaryFile(suffix=".csv", delete=False) as tmp:
                  csv_path = tmp.name
                  df.to_csv(csv_path, index=False)

              try:
                  for bucket in buckets:
                      bucket = bucket.strip()
                      print(f"Uploading {object_key} to s3://{bucket}/{object_key}")
                      s3.upload_file(csv_path, bucket, object_key)
                      print(f"Uploaded dummy taxi data to s3://{bucket}/{object_key}")
              except Exception as exc:
                  print(f"Upload failed: {exc}", file=sys.stderr)
                  sys.exit(1)
              finally:
                  os.remove(csv_path)

              print("Dummy taxi data upload complete.")
              EOF
          env:
            - name: HOME
              value: /tmp
            - name: MINIO_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "minio.secretName" . }}
                  key: user
            - name: MINIO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "minio.secretName" . }}
                  key: password
            - name: OBJECT_KEY
              value: {{ .Values.dataUpload.objectKey | quote }}
            - name: BUCKETS
              value: {{ join "," .Values.dataUpload.buckets | quote }}
{{- end }}
