---
# Default values for ai-taxi-anomaly-detector.

global:
  openshift: true

nameOverride: "ai-taxi-anomaly-detector"
fullnameOverride: "ai-taxi-anomaly-detector"

imagePullSecrets: []
podAnnotations: {}
podLabels: {}
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: "taxi-anomaly-service-account"

# MinIO subchart (ai-architecture-charts)
minio:
  enabled: true

  image:
    repository: quay.io/minio/minio
    tag: latest
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 9090
    apiPort: 9000

  volumeClaimTemplates:
    - metadata:
        name: minio-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

  volumeMounts:
    - mountPath: /data
      name: minio-data

  secret:
    create: true
    user: taxi_minio_user
    password: taxi_minio_password
    host: minio
    port: "9000"

  sampleFileUpload:
    enabled: false

  buckets:
    create: true
    names:
      - dev-data
      - data

  serviceAccount:
    create: false
    name: taxi-anomaly-service-account

# Post-install job uploads synthetic taxi CSV data to MinIO buckets (demo / offline use)
dataUpload:
  enabled: false
  buckets:
    - dev-data
    - data
  objectKey: taxi_trips.csv

# Post-install job imports NYC TLC trip record parquet files into MinIO.
# Source: https://www.nyc.gov/site/tlc/about/tlc-trip-record-data.page
# Files follow {tripType}_{YYYY-MM}.parquet on the TLC CloudFront bucket.
# TLC publishes data roughly two months behind the current calendar month.
dataImport:
  enabled: true
  baseUrl: "https://d37ci6vzurychx.cloudfront.net/trip-data"
  startYear: 2025
  startMonth: 10
  endYear: 2026
  endMonth: 1
  tripTypes:
    - yellow_tripdata
    - green_tripdata
    - fhv_tripdata
    - fhvhv_tripdata
  buckets:
    - data
  prefix: tlc-trip-data
  notebookTripType: yellow_tripdata
  skipExisting: true
  activeDeadlineSeconds: 7200
  resources:
    limits:
      cpu: "2"
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi

# OpenShift AI data connections for MinIO buckets
dataConnections:
  enabled: true
  endpoint: "http://minio:9000"
  region: us-east-1
  connections:
    - name: taxi-dev-data
      displayName: "Taxi Dev Data (MinIO)"
      bucket: dev-data
    - name: taxi-data
      displayName: "Taxi Data (MinIO)"
      bucket: data

# Jupyter notebook (OpenShift AI workbench)
notebook:
  enabled: true
  # OpenShift user who owns the workbench — must match `oc whoami`
  username: ""
  displayName: "Taxi Anomaly Detector"
  dashboard:
    # RHODS dashboard route host (without https://), e.g. rhods-dashboard-redhat-ods-applications.apps.<cluster>
    host: ""

  image:
    repository: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/s2i-generic-data-science-notebook
    tag: "2025.2"
    pullPolicy: IfNotPresent
    displayName: "Standard Data Science"

  resources:
    limits:
      cpu: "2"
      memory: "8Gi"
    requests:
      cpu: "1"
      memory: "4Gi"

  storage:
    size: 10Gi
    storageClassName: ""

  shm:
    enabled: true
    size: 1Gi

  # Bundle notebooks in chart/files/notebooks (used alone or as gitSync fallback).
  notebooks:
    embedFromChart: false

  gitSync:
    enabled: true
    # Use chart-bundled notebooks when the git repo has no notebooks/ path yet.
    fallbackToEmbedded: true
    # Clones via initContainer on the workbench pod (avoids RWO multi-attach vs a hook Job).
    # useJob: true runs a separate Helm hook Job — only use with ReadWriteMany PVCs.
    useJob: false
    repo: "https://github.com/rh-ai-quickstart/ai-taxi-anomaly-detector.git"
    branch: "main"
    image: "alpine/git:latest"
    notebooksPath: "notebooks"

  minio:
    endpoint: "http://minio:9000"
    defaultBucket: "data"
